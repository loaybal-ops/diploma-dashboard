function findSheet(wb, targetName) {
  if (wb.Sheets[targetName]) return wb.Sheets[targetName];
  const norm = (s) => s.replace(/\s+/g, "").replace(/[^\u0600-\u06FF\w]/g, "");
  const t = norm(targetName);
  for (const name of wb.SheetNames) {
    if (norm(name).includes(t.substring(0, 8)) || t.includes(norm(name).substring(0, 8))) {
      return wb.Sheets[name];
    }
  }
  return null;
}

  return XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, blankrows: false });

  const rows = aoa(ws);
  let headerIdx = -1;
  for (let i = 0; i < rows.length; i++) {
    const r = rows[i] || [];

      headerIdx = i;

  }
  if (headerIdx === -1) throw new Error(`\u0635\u0641\u0648\u0641 \u0627\u0644\u062A\u0631\u0648\u064A\u0633\u0629 \u063A\u064A\u0631 \u0645\u0648\u062C\u0648\u062F\u0629 \u0641\u064A "${SHEET_NAMES.mcda}"`);
  const programs = [];
  for (let i = headerIdx + 1; i < rows.length; i++) {
    const r = rows[i] || [];
    const rank = r[0];
    if (typeof rank !== "number") break;
    programs.push({
      rank,
      name: r[1],
      mode: r[2],
      terms: r[3],
      demand: r[4],
      financial: r[5],
      employment: r[6],
      market: r[7],
      score: r[8],
      category: r[9],
      limitedData: typeof r[3] === "number" && r[3] <= 2
    });
  }
  if (programs.length === 0) throw new Error("\u0644\u0645 \u064A\u062A\u0645 \u0627\u0633\u062A\u062E\u0631\u0627\u062C \u0623\u064A \u0628\u0631\u0646\u0627\u0645\u062C \u0645\u0646 \u0648\u0631\u0642\u0629 MCDA");

        currentMode = "\u0627\u0646\u062A\u0638\u0627\u0645 \u0645\u0633\u0627\u0626\u064A";
        inDataBlock = false;
